schema_version: 1

repository:
  id: "repo_01KX8PR7M56DAMS71HMG9V4KB5"
  display_name: "rldyour-claudecode"
  roles:
    - "module"
  lifecycle: "active"

provider:
  type: "github"
  installation: "installation:github-organization"
  repository_id: 1231429433
  owner: "NDDev-it-com"
  name: "rldyour-claudecode"

classification:
  portfolios:
    - "portfolio:organization-projects"
    - "portfolio:public-modules"
  visibility_contract: "public"
  data_classification: "public"

policy:
  profiles:
    - "repository-default"
    - "organization-default"
    - "public-module"
  rollout_ring: "canary-modules"

git:
  default_branch: "main"
  integration: "pull-request"
  branch_model: "task-branches"
  handoff_pr: "preferred"
  cleanup: "merged-only"

verification:
  commands:
    test:
      - "uv run --with pytest --with pyyaml python -m pytest -q"
  required:
    - "test"

agent:
  context_profile: "public-module"
  generated_agents: false
  serena:
    enabled: true
    provenance_required: true

module:
  contract: "public"
  consumption:
    - "git-submodule"
  compatibility: "semver"
  pin_policy: "default-branch-commit"
  publication:
    registry: "none"
    github_release: "required"

release:
  mode: "github-release"

version: 2

# Dependabot keeps third-party GitHub Actions and the Claude Code CLI npm
# pin from drifting silently. PRs require human review (auto-merge disabled).
# .github/workflows/claude-cli-drift.yml provides a redundant weekly check
# so drift surfaces even if Dependabot is delayed.

updates:
  # Track all third-party GitHub Actions used in .github/workflows/*.yml.
  # SHA-pinned tags surface as PRs that bump both the SHA and the trailing
  # tag comment. Monthly cadence keeps PR noise low; security alerts are
  # delivered separately via GitHub's security advisories.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - ci
      - dependencies
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # Track the Claude Code CLI pin in /package.json (devDependencies).
  # Single-package ecosystem so the PR title is unambiguous; no grouping.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - ci
      - dependencies
      - claude-code
    commit-message:
      prefix: build
      include: scope

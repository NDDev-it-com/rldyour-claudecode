name: codeql

# Semantic security analysis for Python (validators in scripts/ + plugins/*/scripts/)
# and GitHub Actions workflows themselves. CodeQL is free for public repositories.
#
# Coverage:
#   - python      → scripts/*.py + plugins/*/scripts/*.py + tests/*.py
#   - actions     → .github/workflows/*.yml (workflow YAML analysis)
#
# Why two languages: Python catches injection/path-traversal/unsafe-eval; the
# actions analyzer catches workflow-permission overreach, untrusted input usage,
# tag-vs-SHA pinning gaps, secret exposure in run blocks. Both languages run as
# separate matrix entries so failure of one does not block the other.
#
# SHA-pinned actions per OWASP A03:2025. CodeQL action pinned via 4.35.2 tag.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly background scan to surface drift even when no PR opens.
    - cron: '15 6 * * 2'  # Tuesday 06:15 UTC, off-peak
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    permissions:
      contents: read
      security-events: write    # required by codeql-action/analyze to upload SARIF
      actions: read             # required by codeql-action/init for `actions` language

    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'actions']
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/public-codeql.yml@71f4345cad2998a16e8e14b800eee88c68d865ac # 0.2.3
    with:
      languages: '["${{ matrix.language }}"]'
      egress_policy: block

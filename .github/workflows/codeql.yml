name: codeql

# Semantic security analysis for Python (validators in scripts/ + plugins/*/scripts/)
# and GitHub Actions workflows themselves. CodeQL is free for public repositories.
#
# Coverage:
#   - python      → scripts/*.py + plugins/*/scripts/*.py + tests/*.py
#   - actions     → .github/workflows/*.yml (workflow YAML analysis)
#
# Why two languages: Python catches injection/path-traversal/unsafe-eval; the
# actions analyzer catches workflow-permission overreach, untrusted input usage,
# tag-vs-SHA pinning gaps, secret exposure in run blocks. Both languages run as
# separate matrix entries so failure of one does not block the other.
#
# SHA-pinned actions per OWASP A03:2025. CodeQL action pinned via 4.35.2 tag.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly background scan to surface drift even when no PR opens.
    - cron: '15 6 * * 2'  # Tuesday 06:15 UTC, off-peak
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write    # required by codeql-action/analyze to upload SARIF
      actions: read             # required by codeql-action/init for `actions` language

    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'actions']

    steps:
      - name: Harden runner (egress block + explicit allowlist)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            uploads.github.com:443
            files.pythonhosted.org:443
            pypi.org:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL (${{ matrix.language }})
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` is a strict superset of `security-extended`
          # (adds maintainability checks on top of taint/crypto/path queries).
          # Choosing the superset avoids redundant query execution. Free for
          # public repos.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"

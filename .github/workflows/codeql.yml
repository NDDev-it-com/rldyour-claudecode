name: codeql

# SAST via GitHub CodeQL. Scans Python (Serena hooks/scripts, fullrepo_sync,
# analyzer) and the GitHub Actions workflow YAML themselves. Findings appear
# in the Security tab of the repository.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly drift sweep to pick up new CodeQL rules even when the repo is quiet.
    - cron: '13 6 * * 2'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      # `actions: read` is required for CodeQL on private repos to inspect
      # workflow run metadata. Without it the analyze step fails with
      # "Resource not accessible by integration".
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f411752efdf656cb71aa17b755b22c890960da1d  # v3.35.5
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@f411752efdf656cb71aa17b755b22c890960da1d  # v3.35.5
        with:
          category: /language:${{ matrix.language }}

name: release

# Fully automated release on numeric product tag push (`X.Y.Z`).
# Claude plugin-scoped tags are historical implementation tags only; the
# primary public GitHub Release tag must equal root VERSION exactly.
# This workflow validates release state and creates the GitHub Release with
# generated notes + release-manifest.json + release-evidence.tgz.
#
# SHA-pinned actions per OWASP A03:2025. Refresh via scripts/refresh_actions_pins.sh.

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release from VERSION (numeric SemVer X.Y.Z). Creates the tag when dispatching manually.'
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate + publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # gh release create
    steps:
      - name: Harden runner (egress block + explicit allowlist)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            uploads.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            nodejs.org:443
            files.pythonhosted.org:443
            pypi.org:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # need full history for tag verification

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'

      - name: Install Claude Code CLI (from package.json devDependency)
        run: |
          set -euo pipefail
          PINNED="$(python3 -c "import json; print(json.load(open('package.json'))['devDependencies']['@anthropic-ai/claude-code'])")"
          npm install -g "@anthropic-ai/claude-code@${PINNED}"
          claude --version

      - name: Install Python deps for schema validation
        run: pip install --user 'jsonschema>=4.21' 'attrs>=23.2'

      - name: Restore agent-only files from origin/fullrepo
        # AGENTS.md, .claude/CLAUDE.md, .serena/memories/*, .serena/project.yml
        # live on the `fullrepo` branch (ADR-0001). validate_marketplace.sh's
        # "Instruction docs presence" step requires them via --require-agent-docs,
        # so they must be restored into the runner worktree before the harness runs.
        # --restore never publishes; it only fetches and writes agent-only paths.
        run: python3 plugins/rldyour-flow/scripts/fullrepo_sync.py --restore

      - name: Validate marketplace (full harness)
        run: bash scripts/validate_marketplace.sh

      - name: Validate release state
        run: python3 scripts/validate_release_state.py

      - name: Validate release version
        # Inputs interpolation moved to env: per OWASP A05:2025 (security review F-3).
        # Inline ${{ inputs.version }} in `run:` would template-expand into bash
        # source where any shell-metacharacter in the input would alter command
        # semantics; env: passes the value as a normal shell variable so it can
        # only be read, not parsed as code.
        env:
          VERSION_INPUT: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ]; then
            RELEASE_VERSION="$REF_NAME"
          else
            RELEASE_VERSION="$VERSION_INPUT"
          fi
          # Reject inputs that are not bare SemVer X.Y.Z (extra guard since
          # VERSION_INPUT enters shell context as $VAR not template).
          if ! printf '%s' "$RELEASE_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid release version (not bare SemVer): $RELEASE_VERSION" >&2
            exit 1
          fi
          CURRENT="$(cat VERSION)"
          if [ "$CURRENT" != "$RELEASE_VERSION" ]; then
            echo "VERSION file is $CURRENT but release asked for $RELEASE_VERSION" >&2
            exit 1
          fi
          # `grep -F --` treats the argument as a fixed string and stops option
          # parsing - safe with shell variables even after SemVer validation above.
          if ! grep -qF -- "## [$RELEASE_VERSION] - " CHANGELOG.md; then
            echo "CHANGELOG.md missing [$RELEASE_VERSION] entry" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Generate release manifest
        run: |
          mkdir -p release-evidence
          python3 scripts/release_manifest.py > release-evidence/release-manifest.json
          cp CHANGELOG.md release-evidence/CHANGELOG.md
          cp VERSION release-evidence/VERSION
          cp -r docs release-evidence/docs
          tar -czf release-evidence.tgz release-evidence/

      - name: Upload release manifest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-manifest-${{ env.RELEASE_VERSION }}
          path: release-evidence/release-manifest.json
          if-no-files-found: error
          retention-days: 90

      - name: Create release tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${RELEASE_VERSION}" >/dev/null; then
            echo "Tag ${RELEASE_VERSION} already exists locally"
          else
            git tag "${RELEASE_VERSION}"
            git push origin "refs/tags/${RELEASE_VERSION}"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_VERSION}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_VERSION}" \
              release-evidence/release-manifest.json \
              release-evidence.tgz \
              --clobber
          else
            gh release create "${RELEASE_VERSION}" \
              --generate-notes \
              --verify-tag \
              --title "${RELEASE_VERSION}" \
              release-evidence/release-manifest.json \
              release-evidence.tgz
          fi

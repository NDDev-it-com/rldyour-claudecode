name: semgrep

# Static analysis via Semgrep (OSS rules). This is defense-in-depth alongside
# the public-free CodeQL/code-scanning workflow, not a replacement for CodeQL.
# Findings show up in the job log + summary and CI fails on any non-INFO
# finding.
#
# Semgrep CLI container version is pinned independently from MCP runtime
# policy. Bump this workflow intentionally and keep the digest immutable.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly drift sweep at the same time as dependency-check.
    - cron: '13 6 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep OSS scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    container:
      # Digest-pinned semgrep/semgrep:1.164.0 for CI-only static scanning.
      # Resolved 2026-05-28 via Docker Hub v2 manifest API. To re-resolve:
      #   curl -s https://hub.docker.com/v2/repositories/semgrep/semgrep/tags/1.164.0/ | jq -r '.digest'
      # Or:
      #   docker pull semgrep/semgrep:1.164.0 && docker inspect --format='{{index .RepoDigests 0}}' semgrep/semgrep:1.164.0
      # The tag '1.164.0' is mutable upstream; the @sha256 suffix is the immutable manifest-list digest.
      # OWASP A03:2025 supply-chain hardening - closes wave-3 security F-1.
      image: semgrep/semgrep:1.164.0@sha256:207983631beecdbe7fa29196c7f4a7a5f29033933cdb76c687ce4a672e07618d
    steps:
      - name: Harden runner (egress block + explicit allowlist)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            semgrep.dev:443
            metrics.semgrep.dev:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Semgrep scan
        run: |
          set -euo pipefail
          # Explicit OSS rule packs (no telemetry - `--config=auto` requires
          # `--metrics=on` because the rule pack negotiation calls home).
          # Coverage chosen for this marketplace's Python + Shell + YAML +
          # GitHub Actions surface; secrets pack guards against tokens
          # accidentally landing in commits/docs.
          # `--error` makes CI fail on any WARNING/ERROR finding.
          # `--exclude` keeps templates/cache out of scope.
          # Verified-existing rule packs (semgrep.dev/r/ catalog as of 2026-05-16).
          # `p/bash` and `p/yaml` were attempted but returned HTTP 404 - bash
          # security rules are bundled inside `p/security-audit`, YAML lint
          # is covered by `p/github-actions` for workflow YAML and by
          # `p/security-audit` for generic secrets/config patterns.
          semgrep scan \
            --config=p/python \
            --config=p/github-actions \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --config=p/ci \
            --error \
            --metrics=off \
            --exclude='.serena/cache/**' \
            --exclude='.serena/reviews/**' \
            --exclude='.serena/diagnostics/**' \
            --exclude='.serena/.sync_marker' \
            --exclude='.serena/.flow_sync_marker' \
            --exclude='.serena/.serena_sync_state.json' \
            --exclude='.serena/.auto_sync_head' \
            --exclude='.serena/.active_workflow_intent.json' \
            --exclude='.serena/.dirty_stop_ack' \
            --exclude='.serena/.flow_post_task_state.json' \
            --exclude='.serena/.bootstrap_overrides.log' \
            --exclude='**/__pycache__/**' \
            --severity=WARNING \
            --severity=ERROR

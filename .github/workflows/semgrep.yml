name: semgrep

# Static analysis via Semgrep (OSS rules). Replaces CodeQL because the
# repository does not have GitHub Advanced Security enabled (GHAS is a
# paid add-on for private repos and the org/repo plan does not include it).
# Semgrep runs as a CLI without requiring SARIF upload to the Security tab
# (which itself requires GHAS for private repos), so findings show up in
# the job log + summary and CI fails on any non-INFO finding.
#
# Semgrep version pinned to 1.163.0 (matches plugins/rldyour-mcps/.mcp.json
# Semgrep MCP server pin and config/mcp-runtime-versions.env). Bumping the
# CLI version here should track the MCP pin.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly drift sweep at the same time as dependency-check.
    - cron: '13 6 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep OSS scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    container:
      # Digest-pinned semgrep/semgrep:1.163.0 (matches local MCP server pin in
      # plugins/rldyour-mcps/.mcp.json + config/mcp-runtime-versions.env).
      # Resolved 2026-05-16 via Docker Hub v2 manifest API. To re-resolve:
      #   curl -s https://hub.docker.com/v2/repositories/semgrep/semgrep/tags/1.163.0/ | jq -r '.digest'
      # Or:
      #   docker pull semgrep/semgrep:1.163.0 && docker inspect --format='{{index .RepoDigests 0}}' semgrep/semgrep:1.163.0
      # The tag '1.163.0' is mutable upstream; the @sha256 suffix is the immutable manifest-list digest.
      # OWASP A03:2025 supply-chain hardening - closes wave-3 security F-1.
      image: semgrep/semgrep:1.163.0@sha256:7cad2bc2d1e44f87f0bf4be6d1fa23aa90fb72015bebc89fb91385d813987a03
    steps:
      - name: Harden runner (egress block + explicit allowlist)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            semgrep.dev:443
            metrics.semgrep.dev:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Semgrep scan
        run: |
          set -euo pipefail
          # Explicit OSS rule packs (no telemetry - `--config=auto` requires
          # `--metrics=on` because the rule pack negotiation calls home).
          # Coverage chosen for this marketplace's Python + Shell + YAML +
          # GitHub Actions surface; secrets pack guards against tokens
          # accidentally landing in commits/docs.
          # `--error` makes CI fail on any WARNING/ERROR finding.
          # `--exclude` keeps templates/cache out of scope.
          # Verified-existing rule packs (semgrep.dev/r/ catalog as of 2026-05-16).
          # `p/bash` and `p/yaml` were attempted but returned HTTP 404 - bash
          # security rules are bundled inside `p/security-audit`, YAML lint
          # is covered by `p/github-actions` for workflow YAML and by
          # `p/security-audit` for generic secrets/config patterns.
          semgrep scan \
            --config=p/python \
            --config=p/github-actions \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --config=p/ci \
            --error \
            --metrics=off \
            --exclude='.serena/**' \
            --exclude='**/__pycache__/**' \
            --severity=WARNING \
            --severity=ERROR

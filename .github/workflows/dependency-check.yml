name: dependency-check

# SHA-pinned actions per OWASP A03:2025. See .github/workflows/validate.yml
# header for the tag→SHA refresh procedure.

on:
  schedule:
    # Mondays 06:00 UTC - weekly cadence so MCP server upstreams have time to publish.
    - cron: '0 6 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'plugins/rldyour-mcps/.mcp.json'
      - 'config/mcp-runtime-versions.env'
      - 'scripts/check_mcp_runtime_versions.py'
      - '.github/workflows/dependency-check.yml'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mcp-runtime-drift:
    name: MCP runtime version drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner (egress block + explicit allowlist)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: block
          # probe_mcp_upstream.py queries 4 registries: npm, PyPI, Homebrew, Dart.
          # Without these endpoints the probe silently fails for 7 of 9 servers
          # and drift never surfaces in CI (false-negative monitoring).
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            files.pythonhosted.org:443
            pypi.org:443
            registry.npmjs.org:443
            formulae.brew.sh:443
            storage.googleapis.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'

      - name: Compare .mcp.json against config/mcp-runtime-versions.env
        run: python3 scripts/check_mcp_runtime_versions.py

      - name: Validate MCP runtime versions are pinned (no @latest)
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, sys
          mcp = json.load(open('plugins/rldyour-mcps/.mcp.json'))
          fail = 0
          for name, cfg in mcp.get('mcpServers', {}).items():
              if cfg.get('type') == 'http':
                  continue
              args = cfg.get('args', [])
              for a in args:
                  if '@latest' in a or 'latest' == a or a.endswith('@'):
                      print(f'FAIL {name}: unpinned spec in args: {a!r}', file=sys.stderr)
                      fail = 1
          sys.exit(fail)
          PY

      - name: Probe upstream MCP registries (npm + PyPI + Homebrew)
        run: python3 scripts/probe_mcp_upstream.py
        continue-on-error: true  # network probe is best-effort; drift surfaces as ::warning::

  manifest-versions:
    name: Plugin version consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner (egress block + explicit allowlist)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            files.pythonhosted.org:443
            pypi.org:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'

      - name: Run validate_plugin_versions.py
        run: python3 scripts/validate_plugin_versions.py

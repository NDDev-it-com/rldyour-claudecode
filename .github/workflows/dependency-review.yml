name: dependency-review

# SHA-pinned actions per OWASP A03:2025. Refresh tags with:
# git ls-remote --tags https://github.com/actions/dependency-review-action.git 'refs/tags/v4*'

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'plugins/**'
      - 'config/**'
      - '.github/workflows/dependency-review.yml'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner (egress block + explicit allowlist)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Review dependency diff
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: moderate

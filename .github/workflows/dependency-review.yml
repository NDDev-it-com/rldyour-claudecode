name: dependency-review

# SHA-pinned actions per OWASP A03:2025. Refresh tags with:
# git ls-remote --tags https://github.com/actions/dependency-review-action.git 'refs/tags/v4*'

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'plugins/**'
      - 'config/**'
      - '.github/workflows/dependency-review.yml'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    permissions:
      contents: read
      pull-requests: write
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/public-dependency-review.yml@1acba687361415b3f5942acceb40b228bb0387fd # 0.2.4
    with:
      fail_on_severity: moderate

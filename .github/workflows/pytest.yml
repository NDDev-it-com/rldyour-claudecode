name: pytest

# Unit tests for scripts/validate_*.py under tests/. Closes audit F-TEST-05
# (mutation-test fixtures for marketplace invariants). Tests use the
# `fake_repo` fixture in tests/conftest.py to build a minimal marketplace
# tree per test, then exec the validator subprocess and assert on
# exit code + stderr.
#
# SHA-pinned actions per OWASP A03:2025.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'plugins/**'           # plugin-side scripts (e.g. serena_memory_state.py) covered by tests/
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/pytest.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Matrix coverage: Linux (canonical CI) + macOS (catches BSD vs GNU
        # path/encoding/regex differences). Public repos get unlimited Actions
        # minutes per GitHub billing, so macOS coverage is free here.
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.13']
    steps:
      - name: Harden runner (egress block + explicit allowlist)
        if: runner.os == 'Linux'  # harden-runner is Linux-only (per ADR-0010)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            files.pythonhosted.org:443
            pypi.org:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install test dependencies
        run: pip install --user 'pytest>=8.0' 'pyyaml>=6.0' 'jsonschema>=4.21' 'attrs>=23.2'

      - name: Run pytest (unit-only)
        # Audit P1 finding: integration tests perform live network probes
        # (registry.npmjs.org, formulae.brew.sh, storage.googleapis.com) and
        # do not belong in the unit-test workflow. Live network probes run in
        # `.github/workflows/dependency-check.yml` where the egress allowlist
        # has the required hosts. Keeping pytest network-free per the audit's
        # 'unit tests must not depend on external network' rule.
        run: python3 -m pytest tests/ -v --tb=short -m "not integration"

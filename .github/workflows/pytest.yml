name: pytest

# Unit tests for scripts/validate_*.py under tests/. Closes audit F-TEST-05
# (mutation-test fixtures for marketplace invariants). Tests use the
# `fake_repo` fixture in tests/conftest.py to build a minimal marketplace
# tree per test, then exec the validator subprocess and assert on
# exit code + stderr.
#
# SHA-pinned actions per OWASP A03:2025.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/pytest.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest scripts/validate_*
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner (egress block + explicit allowlist)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            files.pythonhosted.org:443
            pypi.org:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install test dependencies
        run: pip install --user 'pytest>=8.0' 'pyyaml>=6.0' 'jsonschema>=4.21' 'attrs>=23.2'

      - name: Run pytest
        run: python3 -m pytest tests/ -v --tb=short

name: actionlint

# Lints GitHub Actions workflow YAML for syntax errors, expression typos,
# unused vars, deprecated patterns. Complements CodeQL `actions` language
# coverage with workflow-syntax-specific checks.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    permissions:
      contents: read
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/actionlint.yml@71f4345cad2998a16e8e14b800eee88c68d865ac # 0.2.3

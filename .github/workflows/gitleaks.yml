name: gitleaks

# Defense-in-depth secret scanning with the gitleaks OSS CLI inside its
# official Docker image. GitHub-native public repository secret scanning is
# live-validated separately; this workflow keeps full-history defense in depth
# and fails CI on non-allowlisted findings.
#
# Image pinned to a digest below; refresh occasionally via
# `docker pull zricethezav/gitleaks:v8.30.1 && docker inspect --format='{{index .RepoDigests 0}}' zricethezav/gitleaks:v8.30.1`

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly background scan catches secrets that slipped through PR-time
    # scans (e.g., on protected branches where rules differ, or if a future
    # `paths:` filter is added). Cron is off-peak (Tue 06:00 UTC).
    - cron: '0 6 * * 2'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks scan
    permissions:
      contents: read
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/secret-scan.yml@86f3e6d70a632561527379e5f962f57de81eb751 # 0.2.4
    with:
      report_format: sarif
      report_path: gitleaks-report.sarif
      upload_report: true
      artifact_name: gitleaks-sarif-${{ github.run_id }}

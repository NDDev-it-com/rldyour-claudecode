name: gitleaks

# Defense-in-depth secret scanning on top of Semgrep p/secrets. Runs the
# gitleaks OSS CLI inside its official Docker image; no SARIF upload to
# the GitHub Security tab (which would require paid GitHub Advanced
# Security on private repos). Findings surface in the job summary +
# stderr and fail CI when any non-allowlisted finding is detected.
#
# Image pinned to a digest below; refresh occasionally via
# `docker pull zricethezav/gitleaks:v8.30.1 && docker inspect --format='{{index .RepoDigests 0}}' zricethezav/gitleaks:v8.30.1`

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner (egress block + explicit allowlist)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # gitleaks needs full history for `--source` git mode

      - name: Run gitleaks detect (full history)
        run: |
          set -euo pipefail
          # Digest-pinned per OWASP A03:2025 (security review F-1).
          # Re-resolve via: curl -s https://hub.docker.com/v2/repositories/zricethezav/gitleaks/tags/v8.30.1/ | jq -r .digest
          # Workspace mounted rw (was ro) so --report-path can actually write the SARIF artifact
          # (security review F-2 fix - report-path write to :ro mount silently dropped output).
          # v8.30.1 patch bump: goreleaser update + report template cleanup + Go 1.24 build (no breaking changes).
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect \
              --source /repo \
              --redact \
              --no-banner \
              --report-format sarif \
              --report-path /repo/gitleaks-report.sarif \
              --exit-code 1

      - name: Upload SARIF artifact (always, for forensic review)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: gitleaks-sarif-${{ github.run_id }}
          path: gitleaks-report.sarif
          if-no-files-found: ignore
          retention-days: 30

      - name: Surface report on failure
        if: failure()
        run: |
          if [ -f gitleaks-report.sarif ]; then
            cat gitleaks-report.sarif
          fi

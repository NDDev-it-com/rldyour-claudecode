name: validate

# SHA-pinned actions per OWASP A03:2025 supply-chain hardening. Tag → SHA
# mapping resolved on 2026-05-16 via `gh api /repos/<owner>/<repo>/git/ref/tags/<tag>`.
# When updating, run scripts/refresh_actions_pins.sh (or manually re-resolve via gh
# api) and update the trailing comment to reflect the new semantic tag.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Deny-all default per OWASP A01:2025; grant per-job below.
permissions: {}

# Cancel redundant runs on the same ref to save CI minutes and surface
# the freshest result first.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-marketplace:
    name: claude plugin validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner (egress block + explicit allowlist)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            nodejs.org:443
            files.pythonhosted.org:443
            pypi.org:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22

      - name: Install Claude Code CLI (pinned)
        run: npm install -g '@anthropic-ai/claude-code@2.1.143'

      - name: claude --version
        run: claude --version

      - name: Validate marketplace manifest
        run: claude plugin validate .

      - name: Validate every plugin manifest
        run: |
          set -euo pipefail
          for plugin in plugins/*/; do
            echo "::group::$plugin"
            claude plugin validate "$plugin"
            echo "::endgroup::"
          done

  syntax-checks:
    name: Python + shell + JSON syntax + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Harden runner (egress block + explicit allowlist)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            agent.api.stepsecurity.io:443
            api.github.com:443
            github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            nodejs.org:443
            files.pythonhosted.org:443
            pypi.org:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'

      - name: Install Python deps for schema validation
        run: pip install --user 'jsonschema>=4.21' 'attrs>=23.2'

      - name: Restore agent-only files from origin/fullrepo
        # ADR-0001: AGENTS.md, .claude/CLAUDE.md, .serena/memories/*,
        # .serena/project.yml live only on origin/fullrepo. Several
        # validators (validate_instruction_docs --require-agent-docs;
        # generate_inventory --check counting .serena/memories) require
        # them in the worktree to behave consistently with local runs.
        run: python3 plugins/rldyour-flow/scripts/fullrepo_sync.py --restore

      - name: JSON Schema validation (marketplace + plugin + mcp + lsp + hooks)
        run: python3 scripts/validate_json_schemas.py

      - name: Validate JSON manifests
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob, json, sys
          paths = (
              ['.claude-plugin/marketplace.json']
              + sorted(glob.glob('plugins/*/.claude-plugin/plugin.json'))
              + sorted(glob.glob('plugins/*/.mcp.json'))
              + sorted(glob.glob('plugins/*/.lsp.json'))
              + sorted(glob.glob('plugins/*/hooks/hooks.json'))
          )
          fail = 0
          for p in paths:
              try:
                  with open(p, 'r', encoding='utf-8') as fp:
                      json.load(fp)
              except Exception as exc:
                  print(f'{p}: {exc}', file=sys.stderr)
                  fail = 1
              else:
                  print(f'OK {p}')
          sys.exit(fail)
          PY

      - name: Validate Python script syntax
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import ast, glob, sys
          fail = 0
          for p in (
              sorted(glob.glob('plugins/*/scripts/*.py'))
              + sorted(glob.glob('plugins/*/hooks/*.py'))
              + sorted(glob.glob('scripts/*.py'))
          ):
              try:
                  with open(p, 'r', encoding='utf-8') as fp:
                      ast.parse(fp.read())
                  print(f'OK {p}')
              except SyntaxError as e:
                  print(f'FAIL {p}: {e}', file=sys.stderr)
                  fail = 1
          sys.exit(fail)
          PY

      - name: Validate shell script syntax
        run: |
          set -euo pipefail
          fail=0
          # NUL-delimited find + read pair (shellcheck SC2044) is safe for paths
          # with spaces, newlines, and shell metacharacters.
          while IFS= read -r -d '' f; do
            if bash -n "$f"; then
              echo "OK $f"
            else
              echo "FAIL $f"
              fail=1
            fi
          done < <(find plugins scripts -type f -name '*.sh' -print0 2>/dev/null)
          test "$fail" -eq 0

      - name: Markdown frontmatter present in skills/agents/commands
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
            if head -1 "$f" | grep -q '^---$'; then
              echo "OK $f"
            else
              echo "MISSING-FRONTMATTER $f"
              fail=1
            fi
          done < <(find plugins -type f \( -name 'SKILL.md' -o -path '*/agents/*.md' -o -path '*/commands/*.md' \) -print0)
          test "$fail" -eq 0

      - name: Plugin version consistency
        run: python3 scripts/validate_plugin_versions.py

      - name: MCP runtime version drift
        run: python3 scripts/check_mcp_runtime_versions.py

      - name: Skill routing policy
        run: python3 scripts/validate_skill_routing.py

      - name: Agent tools allowlist validation
        run: python3 scripts/validate_agent_tools.py

      - name: Skill allowed-tools server-namespace check
        run: python3 scripts/validate_skill_allowed_tools.py

      - name: Text hygiene (em-dashes + BIDI controls)
        run: python3 scripts/validate_text_hygiene.py

      - name: Hook lifecycle smoke
        run: bash scripts/smoke_hooks.sh

      - name: Serena memory taxonomy smoke
        run: bash scripts/smoke_serena_memory_taxonomy.sh

      - name: Bootstrap R5 divergence guard smoke
        run: bash scripts/smoke_bootstrap_check.sh

      - name: Reviewer output transport contract drift
        run: bash scripts/validate_reviewer_contracts.sh

      - name: Claude Code docs canon drift
        run: python3 scripts/validate_docs_canon.py

      - name: AGENTS.md <-> .claude/CLAUDE.md sync_contract drift
        run: python3 scripts/validate_instruction_sync.py

      - name: Release state parity (VERSION + CHANGELOG + manifests + tag)
        run: python3 scripts/validate_release_state.py

      - name: README inventory block freshness
        run: python3 scripts/generate_inventory.py --check

      - name: MCP runtime smoke (pinning + HTTP preflight)
        run: bash scripts/smoke_mcp_runtime.sh
        # smoke_mcp_capabilities.sh is intentionally local-only: it performs
        # session-based JSON-RPC initialize + tools/list and figma requires
        # interactive auth that is unavailable in CI. Run it manually after
        # any .mcp.json pin bump per MCP-01-TRANSPORT.
